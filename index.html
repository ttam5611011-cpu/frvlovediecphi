<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Sweep</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#1f2230;
  font-family:monospace;
}

.frame{
  width:min(760px,92vw);
  background:#2a2d3c;
  border-radius:18px;
  padding:18px;
}

.panel{
  background:#030405;
  border-radius:28px;
  padding:24px 28px;
  overflow:hidden;
}

.rainbow-text,
.sub-text{
  position:relative;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  line-height:1.42;
  color:#0aa7ff;
  font-size:clamp(18px,2.2vw,31px);
}

.rainbow-text::before,
.sub-text::before{
  content:attr(data-text);
  position:absolute;
  inset:0;

  background:linear-gradient(
    90deg,
    #0aa7ff 0%,
    #0aa7ff 34%,
    #ffffff 50%,
    #22ff6f 66%,
    #22ff6f 100%
  );

  background-size:260% 100%;
  background-position:-180% 0;

  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;

  filter:
    drop-shadow(0 0 4px rgba(0,180,255,.45))
    drop-shadow(0 0 7px rgba(40,255,120,.30));

  animation: sweep 0.32s linear infinite;
}

.sub-text{
  margin-top:12px;
  font-size:clamp(16px,1.9vw,24px);
}

@keyframes sweep{
  from{
    background-position:-180% 0;
  }
  to{
    background-position:180% 0;
  }
}
</style>
</head>

<body>
  <div class="frame">
    <div class="panel">
      <div class="rainbow-text" data-text="NGUYEN BACH DUONG - MASTER ZALO">NGUYEN BACH DUONG - MASTER ZALO</div>
      <div class="rainbow-text" data-text="NGUYEN BACH DUONG - MASTER ZALO">NGUYEN BACH DUONG - MASTER ZALO</div>
      <div class="rainbow-text" data-text="NGUYEN BACH DUONG - MASTER ZALO">NGUYEN BACH DUONG - MASTER ZALO</div>
      <div class="rainbow-text" data-text="NGUYEN BACH DUONG - MASTER ZALO">NGUYEN BACH DUONG - MASTER ZALO</div>
      <div class="rainbow-text" data-text="NGUYEN BACH DUONG - MASTER ZALO">NGUYEN BACH DUONG - MASTER ZALO</div>
      <div class="rainbow-text" data-text="NGUYEN BACH DUONG - MASTER ZALO">NGUYEN BACH DUONG - MASTER ZALO</div>
      <div class="rainbow-text" data-text="NGUYEN BACH DUONG - MASTER ZALO">NGUYEN BACH DUONG - MASTER ZALO</div>

      <div class="sub-text" data-text="FROM : TU LIEU MAT">FROM : TU LIEU MAT</div>
    </div>
  </div>
</body>
</html>
